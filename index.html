<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Card Scale Debug</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-bottom: 56px;   /* clear the collapsed log toggle bar */
    user-select: none;
  }

  #status {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 48px;
  }

  #status.connected { color: #4caf50; }
  #status.error     { color: #ef5350; }

  #card-display {
    text-align: center;
    margin-bottom: 48px;
  }

  #card-value {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    color: #ffffff;
    min-height: 80px;
    transition: all 0.2s ease;
  }

  #card-suit {
    font-size: 48px;
    margin-top: 8px;
    min-height: 56px;
    transition: all 0.2s ease;
  }

  #card-full {
    font-size: 16px;
    color: #888;
    margin-top: 16px;
    letter-spacing: 0.05em;
    min-height: 24px;
  }

  #weight-display {
    font-size: 14px;
    color: #555;
    font-variant-numeric: tabular-nums;
    margin-bottom: 48px;
    font-family: "SF Mono", "Courier New", monospace;
  }

  #weight-display span {
    color: #888;
  }

  /* persistent battery badge, pinned top-right like a phone status bar */
  #batt-indicator {
    position: fixed;
    top: 14px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: #888;
    z-index: 10;
  }

  .batt-icon {
    position: relative;
    width: 24px;
    height: 12px;
    border: 1.5px solid currentColor;
    border-radius: 3px;
    padding: 1px;
  }

  .batt-icon::after {            /* the little nub on the right */
    content: '';
    position: absolute;
    right: -4px;
    top: 3px;
    width: 2px;
    height: 4px;
    background: currentColor;
    border-radius: 0 1px 1px 0;
  }

  .batt-fill {
    display: block;
    height: 100%;
    width: 0%;
    background: #4caf50;
    border-radius: 1px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  #batt-indicator.low { color: #ef5350; }
  #batt-indicator.low .batt-fill { background: #ef5350; }

  .btn {
    display: block;
    width: 100%;
    max-width: 280px;
    padding: 16px 24px;
    border: 1px solid #333;
    border-radius: 12px;
    background: #1a1a1a;
    color: #f0f0f0;
    font-size: 16px;
    font-family: inherit;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { background: #252525; border-color: #555; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  #connect-btn { margin-bottom: 12px; }

  #tare-btn {
    display: none;
    margin-bottom: 12px;
    border-color: #2e7d32;
    color: #81c784;
  }
  #tare-btn:active { background: #1b3a1e; border-color: #4caf50; }
  #tare-btn.confirm { background: #2e7d32; border-color: #4caf50; color: #fff; }

  #disconnect-btn {
    display: none;
    border-color: #2a2a2a;
    color: #555;
    font-size: 13px;
    padding: 10px;
  }

  #log-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #222;
    z-index: 5;
  }

  #log-toggle {
    display: block;
    width: 100%;
    background: #141414;
    border: none;
    color: #666;
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 7px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #log {
    max-height: 120px;
    overflow-y: auto;
    padding: 8px 16px;
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 11px;
    color: #555;
  }

  #log-panel.collapsed #log { display: none; }

  #log div { margin-bottom: 2px; }
  #log .new { color: #888; }

  .suit-hearts, .suit-diamonds { color: #ef5350; }
  .suit-spades, .suit-clubs    { color: #ffffff; }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.25s ease-out; }
</style>
</head>
<body>

<div id="status">Not connected</div>

<div id="card-display">
  <div id="card-value">—</div>
  <div id="card-suit"></div>
  <div id="card-full"></div>
</div>

<div id="weight-display">
  Raw: <span id="weight-raw">—</span>g
</div>

<div id="batt-indicator">
  <span id="batt-pct">—</span>
  <span class="batt-icon"><span class="batt-fill" id="batt-fill"></span></span>
</div>

<button class="btn" id="connect-btn" onclick="connectBLE()">Connect to Scale</button>
<button class="btn" id="tare-btn" onclick="tareScale()">Tare (zero) deck</button>
<button class="btn" id="disconnect-btn" onclick="disconnectBLE()">Disconnect</button>

<div id="log-panel" class="collapsed">
  <button id="log-toggle" onclick="toggleLog()">Log ▴</button>
  <div id="log"></div>
</div>

<script>
// UUIDs must match firmware exactly
const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
const CARD_UUID    = '12345678-1234-1234-1234-123456789abd';
const WEIGHT_UUID  = '12345678-1234-1234-1234-123456789abe';
const BATT_UUID    = '12345678-1234-1234-1234-123456789abf';
const CMD_UUID     = '12345678-1234-1234-1234-123456789ac0';

const SUIT_SYMBOLS = {
  'Hearts':   { symbol: '♥', cls: 'suit-hearts' },
  'Diamonds': { symbol: '♦', cls: 'suit-diamonds' },
  'Spades':   { symbol: '♠', cls: 'suit-spades' },
  'Clubs':    { symbol: '♣', cls: 'suit-clubs' },
};

let device, server, cardChar, weightChar, cmdChar;

function toggleLog() {
  const p = document.getElementById('log-panel');
  p.classList.toggle('collapsed');
  document.getElementById('log-toggle').textContent =
    p.classList.contains('collapsed') ? 'Log ▴' : 'Log ▾';
}

function log(msg) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'new';
  div.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  el.prepend(div);
  setTimeout(() => div.classList.remove('new'), 2000);
  if (el.children.length > 40) el.removeChild(el.lastChild);
}

function setStatus(text, cls) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = cls || '';
}

function displayCard(cardStr) {
  const valueEl = document.getElementById('card-value');
  const suitEl  = document.getElementById('card-suit');
  const fullEl  = document.getElementById('card-full');

  if (cardStr === 'Ready' || cardStr === '---') {
    valueEl.textContent = '—';
    suitEl.textContent = '';
    suitEl.className = '';
    fullEl.textContent = cardStr === 'Ready' ? 'Tared — waiting' : '';
    return;
  }

  if (cardStr === 'Full deck') {
    valueEl.textContent = '52';
    suitEl.textContent = '🃏';
    suitEl.className = '';
    fullEl.textContent = 'Full deck on scale';
    return;
  }

  // Parse "VALUE SUIT" e.g. "Q Hearts", "10 Diamonds", "A Spades"
  const parts = cardStr.split(' ');
  if (parts.length < 2) return;

  const value = parts[0];
  const suit  = parts[1];
  const suitInfo = SUIT_SYMBOLS[suit];

  // Animate
  valueEl.classList.remove('pop');
  void valueEl.offsetWidth; // reflow
  valueEl.classList.add('pop');

  valueEl.textContent = value;
  if (suitInfo) {
    suitEl.textContent = suitInfo.symbol;
    suitEl.className = suitInfo.cls;
  } else {
    suitEl.textContent = suit;
    suitEl.className = '';
  }
  fullEl.textContent = cardStr;

  log('Card: ' + cardStr);
}

function displayWeight(grams) {
  document.getElementById('weight-raw').textContent = grams.toFixed(1);
}

function displayBattery(pct) {
  document.getElementById('batt-pct').textContent = pct + '%';
  document.getElementById('batt-fill').style.width = pct + '%';
  document.getElementById('batt-indicator').className = pct <= 20 ? 'low' : '';
  if (pct <= 20) log('LOW BATTERY: ' + pct + '%');
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    setStatus('Web Bluetooth not supported', 'error');
    log('iPhone: open this page in the free Bluefy app (App Store) — Safari does not support Web Bluetooth');
    return;
  }

  try {
    setStatus('Scanning…');
    log('Requesting BLE device…');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'CardScale' }],
      optionalServices: [SERVICE_UUID]
    });

    device.addEventListener('gattserverdisconnected', onDisconnected);
    setStatus('Connecting…');
    log('Connecting to ' + device.name);

    server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    cardChar   = await service.getCharacteristic(CARD_UUID);
    weightChar = await service.getCharacteristic(WEIGHT_UUID);

    // Subscribe to notifications
    await cardChar.startNotifications();
    cardChar.addEventListener('characteristicvaluechanged', e => {
      const val = new TextDecoder().decode(e.target.value);
      displayCard(val);
    });

    await weightChar.startNotifications();
    weightChar.addEventListener('characteristicvaluechanged', e => {
      const view = e.target.value;
      const grams = view.getFloat32(0, true); // little-endian
      displayWeight(grams);
    });

    // Battery (optional — won't break connecting to older firmware)
    try {
      const battChar = await service.getCharacteristic(BATT_UUID);
      await battChar.startNotifications();
      battChar.addEventListener('characteristicvaluechanged', e => {
        displayBattery(e.target.value.getUint8(0));
      });
      displayBattery((await battChar.readValue()).getUint8(0));
    } catch (e) {
      log('No battery characteristic (old firmware?)');
    }

    // Command characteristic for remote tare (optional — older firmware lacks it)
    cmdChar = null;
    try {
      cmdChar = await service.getCharacteristic(CMD_UUID);
      document.getElementById('tare-btn').style.display = 'block';
    } catch (e) {
      log('No tare command (old firmware?)');
    }

    // Read initial values
    const cardVal = new TextDecoder().decode((await cardChar.readValue()));
    displayCard(cardVal);

    setStatus('Connected', 'connected');
    document.getElementById('connect-btn').style.display = 'none';
    document.getElementById('disconnect-btn').style.display = 'block';
    log('Connected successfully');

  } catch (err) {
    setStatus('Connection failed', 'error');
    log('Error: ' + err.message);
  }
}

async function tareScale() {
  if (!cmdChar) { log('Not connected'); return; }
  try {
    const data = new Uint8Array([1]);   // any byte triggers a tare
    if (cmdChar.writeValueWithoutResponse) await cmdChar.writeValueWithoutResponse(data);
    else await cmdChar.writeValue(data);
    log('Tare sent');
    flashTareConfirm();
  } catch (e) {
    log('Tare failed: ' + e.message);
  }
}

function flashTareConfirm() {
  const btn = document.getElementById('tare-btn');
  if (btn.dataset.flashing) return;          // ignore rapid re-taps mid-flash
  btn.dataset.flashing = '1';
  const orig = btn.textContent;
  btn.textContent = 'Tared ✓';
  btn.classList.add('confirm');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('confirm');
    delete btn.dataset.flashing;
  }, 1100);
}

function onDisconnected() {
  setStatus('Disconnected', 'error');
  cmdChar = null;
  document.getElementById('connect-btn').style.display = 'block';
  document.getElementById('tare-btn').style.display = 'none';
  document.getElementById('disconnect-btn').style.display = 'none';
  log('Device disconnected');
}

function disconnectBLE() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
}
</script>
</body>
</html>
